<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tedy Afro | Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <nav class="nav main-nav">
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="store.html">STORE</a></li>
            <li><a href="about.html">ABOUT</a></li>
        </ul>
    </nav>
    <h1 class="band-name band-name-large">Tedy Afro</h1>
</header>

<!-- MUSIC -->
<section class="container content-section">
    <h2 class="section-header">MUSIC</h2>

    <div class="shop-items">

        <div class="shop-item">
            <span class="shop-item-title">Album 1</span>
            <img class="shop-item-image" src="asset/image2.png" alt="Album 1 cover artwork">
            <div class="shop-item-details">
                <span class="shop-item-price">$100</span>
                <button class="btn btn-primary shop-item-button">ADD TO CART</button>
            </div>
        </div>

        <div class="shop-item">
            <span class="shop-item-title">Album 2</span>
            <img class="shop-item-image" src="asset/image1.png" alt="Album 2 cover artwork">
            <div class="shop-item-details">
                <span class="shop-item-price">$200</span>
                <button class="btn btn-primary shop-item-button">ADD TO CART</button>
            </div>
        </div>

        <div class="shop-item">
            <span class="shop-item-title">Album 3</span>
            <img class="shop-item-image" src="asset/image3.png" alt="Album 3 cover artwork">
            <div class="shop-item-details">
                <span class="shop-item-price">$100</span>
                <button class="btn btn-primary shop-item-button">ADD TO CART</button>
            </div>
        </div>

        <div class="shop-item">
            <span class="shop-item-title">Album 4</span>
            <img class="shop-item-image" src="asset/image4.png" alt="Album 4 cover artwork">
            <div class="shop-item-details">
                <span class="shop-item-price">$100</span>
                <button class="btn btn-primary shop-item-button">ADD TO CART</button>
            </div>
        </div>

    </div>
</section>

<!-- MERCH -->
<section class="container content-section">
    <h2 class="section-header">MERCH</h2>

    <div class="shop-items">

        <div class="shop-item">
            <span class="shop-item-title">T-Shirt</span>
            <img class="shop-item-image" src="asset/t-shirt.png" alt="T-shirt merchandise">
            <div class="shop-item-details">
                <span class="shop-item-price">$500</span>
                <button class="btn btn-primary shop-item-button">ADD TO CART</button>
            </div>
        </div>

        <div class="shop-item">
            <span class="shop-item-title">Coffee Cup</span>
            <img class="shop-item-image" src="asset/coffee.png" alt="Coffee cup merchandise">
            <div class="shop-item-details">
                <span class="shop-item-price">$10</span>
                <button class="btn btn-primary shop-item-button">ADD TO CART</button>
            </div>
        </div>

    </div>
</section>

<!-- CART (THIS WAS MISSING / WRONG BEFORE) -->
<section class="container content-section">
    <h2 class="section-header">CART</h2>

    <!-- HEADER -->
    <div class="cart-row">
        <span class="cart-item cart-header cart-column">ITEM</span>
        <span class="cart-price cart-header cart-column">PRICE</span>
        <span class="cart-quantity cart-header cart-column">QUANTITY</span>
    </div>

    <!-- ITEMS -->
    <div class="cart-items">

        <div class="cart-row">
            <div class="cart-item cart-column">
                <img class="cart-item-image" src="asset/t-shirt.png" width="100" alt="T-shirt cart item">
                <span class="cart-item-title">T-Shirt</span>
            </div>

            <span class="cart-price cart-column">$500</span>

            <div class="cart-quantity cart-column">
                <input class="cart-quantity-input" type="number" value="1">
                <button class="btn btn-danger">REMOVE</button>
            </div>
        </div>

        <div class="cart-row">
            <div class="cart-item cart-column">
                <img class="cart-item-image" src="asset/image3.png" width="100" alt="Album 3 cart item">
                <span class="cart-item-title">Album 3</span>
            </div>

            <span class="cart-price cart-column">$100</span>

            <div class="cart-quantity cart-column">
                <input class="cart-quantity-input" type="number" value="2">
                <button class="btn btn-danger">REMOVE</button>
            </div>
        </div>

    </div>

    <!-- TOTAL -->
    <div class="cart-total">
        <strong class="cart-total-title">Total</strong>
        <span class="cart-total-price">$700</span>
    </div>

    <!-- PURCHASE -->
    <button class="btn btn-primary btn-purchase">PURCHASE</button>
</section>

<!-- FOOTER (UNCHANGED ✅) -->
<footer class="footer">
    <div class="container main-footer-container">
        <h3 class="band-name">tedy afro</h3>
        <ul class="nav footer-nav">
            <li><a href="https://www.facebook.com" target="_blank"><img src="asset/facebook.png"></a></li>
            <li><a href="https://www.youtube.com" target="_blank"><img src="asset/youtube.png"></a></li>
            <li><a href="https://www.spotify.com" target="_blank"><img src="asset/spotify.png"></a></li>
        </ul>
    </div>
</footer>

</body>
</html>
